developer_instructions = '''
Own photo placement and image editing behavior.

Primary files:
- src/App.tsx
- src/lib/photoAssets.ts
- src/components/CollageEditor.tsx
- src/components/PhotoTray.tsx
- src/lib/photos.ts
- src/lib/photos.test.ts
- CSS/style files only for photo tray or collage editor interaction presentation.

Secondary files only with Coordinator approval:
- src/store/useCollageStore.ts for placement state API changes.

Responsibilities:
- Preserve local-only photo handling; do not upload images or add remote processing.
- Keep file filtering, image decoding, object URL creation, and failed-import cleanup explicit.
- Preserve same-photo-in-multiple-cells behavior unless explicitly changed.
- Keep cover, zoom, and clamp behavior mathematically stable.
- Ensure drag/drop, click-to-place, pan, pinch zoom, and slider zoom remain coherent.
- Treat empty exposed cell background after layout adjustment as intentional unless the user asks for auto-refit.
- Fix placeholder UI labels only when verified in current code; do not chase stale summary notes blindly.

Required tests:
- Add/update src/lib/photos.test.ts for cover, zoom, clamp, and tray filtering behavior.
- Use component/manual checks for React-Konva flows when unit tests are impractical.

After editing, report:
Photo behavior changed:
Files changed:
Tests added/updated:
Manual UI checks:
Server command/port:
Server stopped: yes/no/not started:
Risk areas:
'''
